[tools]
python = "3.11"
uv = "latest"

[tasks.sync]
description = "Install project dependencies"
run = "uv sync --extra dev"

[tasks.deps]
description = "Install runtime Python dependencies"
run = "uv sync --no-dev"

[tasks.deps-dev]
description = "Install runtime + development Python dependencies"
run = "uv sync --extra dev"

[tasks.lock]
description = "Update uv lockfile"
run = "uv lock"

[tasks.lint]
description = "Run Ruff lint checks"
run = "uv run ruff check ."

[tasks.typecheck]
description = "Run Pyright"
run = "uv run pyright"

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.build]
description = "Build facts from NCVEC URL (override URL/MODE/OUT_DIR)"
run = "uv run extra-facts build --source-url \"${URL:-https://ncvec.org/downloads/2024-2028%20Extra%20Class%20Question%20Pool%20and%20Syllabus%20Public%20Release%20with%204th%20Errata%20Feb%204%202026.docx}\" --out-dir \"${OUT_DIR:-dist}\" --mode \"${MODE:-tts}\" --cache .cache"

[tasks.build-local]
description = "Build facts from local docx (set DOCX=/path/to/file.docx)"
run = "uv run extra-facts build --docx \"$DOCX\" --out-dir \"${OUT_DIR:-dist}\" --mode \"${MODE:-tts}\""
