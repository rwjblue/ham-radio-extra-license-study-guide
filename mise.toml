[tools]
python = "3.11"
uv = "latest"

[env]
_.file = ".env"

[tasks.sync]
description = "Install project dependencies"
run = "uv sync --extra dev"

[tasks.deps]
description = "Install runtime Python dependencies"
run = "uv sync --no-dev"

[tasks.deps-dev]
description = "Install runtime + development Python dependencies"
run = "uv sync --extra dev"

[tasks.lock]
description = "Update uv lockfile"
run = "uv lock"

[tasks.lint]
description = "Run Ruff lint checks"
run = "uv run ruff check ."

[tasks.typecheck]
description = "Run Pyright"
run = "uv run pyright"

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.build]
description = "Build facts from intermediate JSON (set POOL_JSON if needed)"
run = "uv run extra-facts build --pool-json \"${POOL_JSON:-dist/extra_pool.json}\" --out-dir \"${OUT_DIR:-dist}\" --mode \"${MODE:-tts}\""

[tasks.extract]
description = "Extract NCVEC source URL into intermediate JSON"
run = "uv run extra-facts extract --source-url \"${URL:-https://ncvec.org/downloads/2024-2028%20Extra%20Class%20Question%20Pool%20and%20Syllabus%20Public%20Release%20with%204th%20Errata%20Feb%204%202026.docx}\" --out-json \"${OUT_JSON:-dist/extra_pool.json}\" --cache .cache"

[tasks.extract-local]
description = "Extract local docx into intermediate JSON (set DOCX)"
run = "uv run extra-facts extract --docx \"$DOCX\" --out-json \"${OUT_JSON:-dist/extra_pool.json}\""

[tasks.full-build]
description = "Extract, always build static outputs, then optionally build prose outputs"
run = """
uv run extra-facts extract --source-url "${URL:-https://ncvec.org/downloads/2024-2028%20Extra%20Class%20Question%20Pool%20and%20Syllabus%20Public%20Release%20with%204th%20Errata%20Feb%204%202026.docx}" --out-json "${POOL_JSON:-dist/extra_pool.json}" --cache .cache
uv run extra-facts build --pool-json "${POOL_JSON:-dist/extra_pool.json}" --out-dir "${STATIC_OUT_DIR:-dist/static}" --mode "${STATIC_MODE:-tts}"
if [ -n "${OPENAI_API_KEY:-}" ]; then
  uv run extra-facts prose --pool-json "${POOL_JSON:-dist/extra_pool.json}" --out-json "${PROSE_JSON:-dist/extra_pool_prose.json}" --model "${MODEL:-gpt-5-mini}" --prompt-version "${PROMPT_VERSION:-v1}" --workers "${WORKERS:-6}" --max-attempts "${MAX_ATTEMPTS:-3}" ${MAX_QUESTIONS:+--max-questions "$MAX_QUESTIONS"} ${RESUME:+--resume}
  uv run extra-facts build --pool-json "${PROSE_JSON:-dist/extra_pool_prose.json}" --out-dir "${PROSE_OUT_DIR:-dist/prose}" --mode prose
else
  echo "OPENAI_API_KEY not set; skipping prose generation"
fi
"""

[tasks.prose]
description = "Generate LLM prose from intermediate JSON (requires OPENAI_API_KEY)"
run = "uv run extra-facts prose --pool-json \"${POOL_JSON:-dist/extra_pool.json}\" --out-json \"${OUT_JSON:-dist/extra_pool_prose.json}\" --model \"${MODEL:-gpt-5-mini}\" --prompt-version \"${PROMPT_VERSION:-v1}\" --workers \"${WORKERS:-6}\" --max-attempts \"${MAX_ATTEMPTS:-3}\" ${MAX_QUESTIONS:+--max-questions \"$MAX_QUESTIONS\"} ${RESUME:+--resume}"

[tasks.full-prose-build]
description = "Extract, generate prose, then build prose outputs"
run = "uv run extra-facts extract --source-url \"${URL:-https://ncvec.org/downloads/2024-2028%20Extra%20Class%20Question%20Pool%20and%20Syllabus%20Public%20Release%20with%204th%20Errata%20Feb%204%202026.docx}\" --out-json \"${POOL_JSON:-dist/extra_pool.json}\" --cache .cache && uv run extra-facts prose --pool-json \"${POOL_JSON:-dist/extra_pool.json}\" --out-json \"${PROSE_JSON:-dist/extra_pool_prose.json}\" --model \"${MODEL:-gpt-5-mini}\" --prompt-version \"${PROMPT_VERSION:-v1}\" --workers \"${WORKERS:-6}\" --max-attempts \"${MAX_ATTEMPTS:-3}\" && uv run extra-facts build --pool-json \"${PROSE_JSON:-dist/extra_pool_prose.json}\" --out-dir \"${OUT_DIR:-dist}\" --mode prose"

[tasks.compare]
description = "Compare static and prose text outputs"
run = "diff -u \"${STATIC_TXT:-dist/static/static-extra_facts.txt}\" \"${PROSE_TXT:-dist/prose/prose-extra_facts.txt}\" || true"

[tasks.release]
description = "Bump project version with uv, commit, tag, and push"
run = """
bump="${BUMP:-patch}"
uv version --bump "${bump}"
new_version="$(uv version --short)"
echo "New project version: ${new_version}"
git add pyproject.toml uv.lock
jj commit -m "Bump version to ${new_version}"
jj tug
jj git push --tracked
tag="v${new_version}"
echo "Creating release tag: ${tag}"
git tag "${tag}"
git push origin "refs/tags/${tag}:refs/tags/${tag}"
"""
