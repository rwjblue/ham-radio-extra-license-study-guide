name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for example v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-pipeline
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      WORKERS: "16"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache downloaded question pool
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-pool-docx-v1

      - name: Install tools and deps
        run: |
          mise install
          mise run sync

      - name: Build release artifacts
        run: mise run full-build

      - name: Package dist outputs
        run: |
          tar -czf "ham-radio-extra-study-guide-${RELEASE_TAG}.tar.gz" dist
          sha256sum "ham-radio-extra-study-guide-${RELEASE_TAG}.tar.gz" > "ham-radio-extra-study-guide-${RELEASE_TAG}.sha256"

      - name: Collect release assets
        id: release-assets
        run: |
          set -euo pipefail

          mkdir -p dist/release-assets

          required_sources=(
            "ham-radio-extra-study-guide-${RELEASE_TAG}.tar.gz"
            "ham-radio-extra-study-guide-${RELEASE_TAG}.sha256"
            "dist/extra_pool.json"
            "dist/static/extra_facts.txt"
            "dist/static/extra_facts.pdf"
          )

          for path in "${required_sources[@]}"; do
            if [ ! -f "${path}" ]; then
              echo "Required release asset is missing: ${path}" >&2
              exit 1
            fi
          done

          assets=(
            "ham-radio-extra-study-guide-${RELEASE_TAG}.tar.gz"
            "ham-radio-extra-study-guide-${RELEASE_TAG}.sha256"
          )

          cp dist/extra_pool.json dist/release-assets/static-extra_pool.json
          cp dist/static/extra_facts.txt dist/release-assets/static-extra_facts.txt
          cp dist/static/extra_facts.pdf dist/release-assets/static-extra_facts.pdf
          assets+=(
            "dist/release-assets/static-extra_pool.json"
            "dist/release-assets/static-extra_facts.txt"
            "dist/release-assets/static-extra_facts.pdf"
          )

          if [ -f "dist/extra_pool_prose.json" ]; then
            cp dist/extra_pool_prose.json dist/release-assets/prose-extra_pool.json
            assets+=("dist/release-assets/prose-extra_pool.json")
          fi

          if [ -f "dist/prose/extra_facts.txt" ]; then
            cp dist/prose/extra_facts.txt dist/release-assets/prose-extra_facts.txt
            assets+=("dist/release-assets/prose-extra_facts.txt")
          fi

          if [ -f "dist/prose/extra_facts.pdf" ]; then
            cp dist/prose/extra_facts.pdf dist/release-assets/prose-extra_facts.pdf
            assets+=("dist/release-assets/prose-extra_facts.pdf")
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "${assets[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: ${{ steps.release-assets.outputs.files }}
