name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for example v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-pipeline
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      WORKERS: "16"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Restore OpenAI HTTP responses cache
        id: cache-openai-http-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache/openai-http
          key: ${{ runner.os }}-openai-http-v1-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-openai-http-v1-

      - name: Cache downloaded question pool
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-pool-docx-v1

      - name: Install tools and deps
        run: |
          mise install
          mise run sync

      - name: Build release artifacts
        run: mise run full-build

      - name: Package dist outputs
        run: |
          tar -czf "ham-radio-extra-study-guide-${RELEASE_TAG}.tar.gz" dist
          sha256sum "ham-radio-extra-study-guide-${RELEASE_TAG}.tar.gz" > "ham-radio-extra-study-guide-${RELEASE_TAG}.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            ham-radio-extra-study-guide-${{ env.RELEASE_TAG }}.tar.gz
            ham-radio-extra-study-guide-${{ env.RELEASE_TAG }}.sha256
            dist/static/static-extra_facts.txt
            dist/static/static-extra_facts.pdf
            dist/prose/prose-extra_facts.txt
            dist/prose/prose-extra_facts.pdf
            dist/audio/extra_facts_audio.txt
            dist/audio/extra_facts_audio.mp3
            dist/audio/audio_chapters_manifest.json
            dist/audio/chapters/chapter-*.txt
            dist/audio/chapters/chapter-*.mp3
            dist/extra_pool.json
            dist/extra_pool_prose.json

      - name: Save OpenAI HTTP responses cache
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: .cache/openai-http
          key: ${{ steps.cache-openai-http-restore.outputs.cache-primary-key }}
