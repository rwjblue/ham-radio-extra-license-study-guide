name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache OpenAI HTTP responses
        uses: actions/cache@v4
        with:
          path: .cache/openai-http
          key: ${{ runner.os }}-openai-http-v1-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-openai-http-v1-

      - name: Install tools and dependencies
        run: |
          mise install
          mise run deps-dev

      - name: Lint
        run: mise run lint

      - name: Type check
        run: mise run typecheck

      - name: Test
        run: mise run test
